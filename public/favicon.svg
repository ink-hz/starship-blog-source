<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rocket body -->
  <path d="M 50 10 L 35 50 L 35 70 L 50 80 L 65 70 L 65 50 Z" fill="url(#rocketGradient)" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Rocket window -->
  <circle cx="50" cy="35" r="8" fill="#60a5fa" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- Left fin -->
  <path d="M 35 60 L 25 75 L 35 70 Z" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Right fin -->
  <path d="M 65 60 L 75 75 L 65 70 Z" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Flame left -->
  <path d="M 40 80 L 35 90 L 40 88 Z" fill="#fbbf24" opacity="0.9"/>

  <!-- Flame center -->
  <path d="M 50 80 L 45 95 L 55 95 Z" fill="#f59e0b" opacity="0.9"/>

  <!-- Flame right -->
  <path d="M 60 80 L 65 90 L 60 88 Z" fill="#fbbf24" opacity="0.9"/>
</svg>
